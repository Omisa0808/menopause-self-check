                background: 'white',
                padding: '6px 12px',
                borderRadius: 99,
                border: `2px solid ${c.primary}`,
                fontSize: 12,
                fontWeight: 800,
                color: c.deep,
              }}>
                {done}/{section.items.length}
              </div>
            </div>
            {done > 0 && (
              <div style={{ marginTop: 12 }}>
                <div className="prog-track" style={{ background:'rgba(255,255,255,0.7)', borderColor:'rgba(255,255,255,0.9)' }}>
                  <div className="prog-fill" style={{
                    width:`${doneRatio}%`,
                    background: `linear-gradient(90deg, ${c.primary}, ${c.deep})`,
                  }} />
                </div>
              </div>
            )}
          </div>

          {/* Questions */}
          <div style={{ padding:'4px 18px 18px' }}>
            {section.items.map((item, idx) => (
              <QuestionItem
                key={item.id}
                item={item}
                idx={idx}
                score={scores[item.id]}
                onSelect={onSelect}
                color={c}
              />
            ))}
          </div>
        </div>
      );
    }

    function Badge({ zone, big }) {
      return (
        <span style={{
          display:'inline-block',
          fontSize: big ? 13 : 11,
          fontWeight: 800,
          padding: big ? '5px 14px' : '4px 12px',
          borderRadius: 99,
          background: zone.bg,
          color: zone.fg,
          whiteSpace:'nowrap',
          border:`2px solid ${zone.fg}33`,
        }}>
          {zone.label}
        </span>
      );
    }

    function ResultsView({ scores, onBack }) {
      const results = SECTIONS.map(s => {
        const total   = sectionScore(s, scores);
        const done    = answeredCount(s, scores);
        const pct     = Math.round((total / s.maxScore) * 100);
        return { ...s, total, done, pct, zone: getZone(pct) };
      });

      const sorted  = [...results].sort((a, b) => b.pct - a.pct);
      const primary = sorted[0];
      const others  = sorted.slice(1).filter(r => r.pct >= 30);

      return (
        <div className="wrap">
          {/* Hero with kangaroo */}
          <div style={{
            background:'linear-gradient(135deg, #ffe0ec 0%, #fff4c1 60%, #ccf7eb 100%)',
            borderRadius:28,
            padding:'22px 20px 20px',
            marginTop:18, marginBottom:18,
            border:'3px solid white',
            boxShadow:'0 6px 0 rgba(255,111,165,0.20), 0 12px 32px rgba(167,139,250,0.18)',
            display:'flex', alignItems:'center', gap:14,
            position:'relative', overflow:'hidden',
          }}>
            <span className="twinkle" style={{ position:'absolute', top:12, right:30, fontSize:18 }}>✨</span>
            <span className="twinkle d2" style={{ position:'absolute', bottom:14, right:14, fontSize:14 }}>⭐</span>
            <span className="twinkle d3" style={{ position:'absolute', top:30, left:120, fontSize:12 }}>💕</span>
            <img
              src="assets/kangaroo.png"
              alt="カンガルーみさみさ先生"
              className="wobble"
              style={{ width:100, height:100, flexShrink:0, objectFit:'contain', filter:'drop-shadow(0 4px 8px rgba(0,0,0,0.10))' }}
            />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{
                display:'inline-block',
                fontSize:11, fontWeight:800, color:'white',
                background:'var(--pink)', padding:'3px 10px', borderRadius:99,
                marginBottom:7,
              }}>
                🦘 カンガルーみさみさ先生
              </div>
              <h2 style={{ fontSize:21, fontWeight:900, color:'var(--ink)', lineHeight:1.25 }}>
                診断結果が<br />でました〜！🎉
              </h2>
            </div>
          </div>

          {/* Score bar chart */}
          <div className="pop-card" style={{ padding:'20px' }}>
            <div style={{
              fontSize:14, fontWeight:900, color:'var(--ink)',
              marginBottom:16, display:'flex', alignItems:'center', gap:6,
            }}>
              <span style={{ fontSize:18 }}>📊</span>
              スコア一覧
            </div>
            {results.map(r => (
              <div key={r.id} style={{ marginBottom:14 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6, flexWrap:'wrap', gap:6 }}>
                  <span style={{ fontSize:13, fontWeight:800, color:'var(--ink)', display:'flex', alignItems:'center', gap:5 }}>
                    <span style={{ fontSize:16 }}>{r.emoji}</span>{r.title}
                  </span>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ fontSize:15, fontWeight:900, color: r.zone.fg }}>{r.pct}%</span>
                    <Badge zone={r.zone} />
                  </div>
                </div>
                <div className="rbar-track">
                  <div className="rbar-fill" style={{ width:`${r.pct}%`, background: r.zone.bar }} />
                </div>
              </div>
            ))}
          </div>

          {/* Primary type */}
          <div style={{
            background: `linear-gradient(135deg, ${primary.color.soft} 0%, ${primary.color.light} 100%)`,
            border: `3px solid ${primary.color.primary}`,
            borderRadius: 24, padding: 22,
            marginBottom: 18,
            boxShadow: `0 5px 0 ${primary.color.primary}33`,
            position:'relative', overflow:'hidden',
          }}>
            <span className="twinkle" style={{ position:'absolute', top:10, right:14, fontSize:20 }}>✨</span>

            <div className="bubble" style={{
              borderColor: primary.color.primary,
              boxShadow: `0 3px 0 ${primary.color.light}`,
              marginBottom: 16,
              marginLeft: 14,
            }}>
              <div style={{ fontSize:12, color: primary.color.deep, fontWeight:800, marginBottom:3 }}>
                🦘 みさみさ先生より
              </div>
              <div style={{ fontSize:13, color:'var(--ink)', lineHeight:1.55, fontWeight:600 }}>
                あなたの一番のお悩みポイントはこれかも！
              </div>
            </div>

            <div style={{
              background:'white', borderRadius:18, padding:'16px 18px',
              border:`2px dashed ${primary.color.primary}`,
              marginBottom:14,
            }}>
              <div style={{ fontSize:11, fontWeight:800, color: primary.color.deep, letterSpacing:'0.05em', marginBottom:4 }}>
                🎯 あなたの主犯タイプ
              </div>
              <div style={{ fontSize:22, fontWeight:900, color: primary.color.deep, lineHeight:1.3, marginBottom:8, display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:26 }}>{primary.emoji}</span>{primary.title}
              </div>
              <Badge zone={primary.zone} big />
            </div>

            <InfoBox label="🌱 まず取り組むべきこと" value={primary.act} color={primary.color} />
            <div style={{ height: 10 }} />
            <InfoBox label="🔬 専門医に相談すべき検査" value={primary.tst} color={primary.color} />
          </div>

          {/* Other notable types */}
          {others.length > 0 && (
            <div className="pop-card" style={{ padding:20 }}>
              <div style={{ fontSize:14, fontWeight:900, color:'var(--ink)', marginBottom:12, display:'flex', alignItems:'center', gap:6 }}>
                <span style={{ fontSize:18 }}>🔍</span>
                その他の注意タイプ
              </div>
              {others.map(r => (
                <div key={r.id} style={{
                  background: r.color.soft,
                  border:`2px solid ${r.color.light}`,
                  borderRadius:18, padding:14, marginBottom:10,
                  boxShadow:`0 3px 0 ${r.color.light}`,
                }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, flexWrap:'wrap', gap:6 }}>
                    <span style={{ fontSize:14, fontWeight:900, color: r.color.deep, display:'flex', alignItems:'center', gap:5 }}>
                      <span style={{ fontSize:18 }}>{r.emoji}</span>{r.title}
                    </span>
                    <Badge zone={r.zone} />
                  </div>
                  <div style={{ fontSize:12, color:'var(--ink)', lineHeight:1.55, marginBottom:3, fontWeight:500 }}>
                    <strong style={{ color: r.color.deep }}>✓ ケア：</strong>{r.act}
                  </div>
                  <div style={{ fontSize:12, color:'var(--ink)', lineHeight:1.55, fontWeight:500 }}>
                    <strong style={{ color: r.color.deep }}>✓ 検査：</strong>{r.tst}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Legend */}
          <div className="pop-card" style={{ padding:20 }}>
            <div style={{ fontSize:13, fontWeight:900, color:'var(--ink)', marginBottom:12, display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontSize:16 }}>📖</span>
              判定の見方
            </div>
            {[
              { label:'70%以上', zone: getZone(70) },
              { label:'50〜69%', zone: getZone(55) },
              { label:'30〜49%', zone: getZone(40) },
              { label:'30%未満', zone: getZone(10) },
            ].map(row => (
              <div key={row.label} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <Badge zone={row.zone} />
                <span style={{ fontSize:12, color:'var(--gray)', fontWeight:600 }}>{row.label} — {row.zone.desc}</span>
              </div>
            ))}
          </div>

          {/* LINE誘導CTA */}
          <div style={{
            background:'linear-gradient(135deg, #e9fbf0 0%, #ccf7eb 100%)',
            border:'3px solid #06c755',
            borderRadius:24,
            padding:20,
            marginBottom:14,
            boxShadow:'0 5px 0 #06c75555',
            position:'relative', overflow:'hidden',
          }}>
            <span className="twinkle" style={{ position:'absolute', top:10, right:14, fontSize:18 }}>✨</span>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
              <img
                src="assets/kangaroo.png"
                alt=""
                className="wobble"
                style={{ width:64, height:64, flexShrink:0, objectFit:'contain' }}
              />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:11, fontWeight:800, color:'#047857', marginBottom:3 }}>
                  💚 みさみさ先生からのお知らせ
                </div>
                <div style={{ fontSize:14, fontWeight:900, color:'var(--ink)', lineHeight:1.4 }}>
                  あなたの結果について<br />もっと詳しく相談したい方へ
                </div>
              </div>
            </div>
            <div style={{ fontSize:12.5, color:'#2d2438', lineHeight:1.7, fontWeight:600, marginBottom:14 }}>
              診断結果のスクショを送ってくれたら、<br />
              <strong style={{ color:'#047857' }}>あなた専用のケアアドバイス</strong>をお返しします💕<br />
              気になる検査・サプリ・受診先のご質問もどうぞ！
            </div>
            <a
              href={LINE_URL}
              target="_blank"
              rel="noopener noreferrer"
              style={{
                display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                width:'100%', padding:'15px 16px',
                background:'linear-gradient(135deg, #06c755 0%, #00b900 100%)',
                color:'white', fontFamily:'inherit', fontSize:15, fontWeight:900,
                borderRadius:99, textDecoration:'none',
                boxShadow:'0 5px 0 #058842, 0 8px 22px rgba(6,199,85,0.35)',
                letterSpacing:'0.02em',
              }}
            >
              <span style={{ fontSize:18 }}>💬</span>
              LINEでみさみさ先生に相談する
            </a>
          </div>

          {/* シェアボタン */}
          <div className="pop-card" style={{ padding:16, marginBottom:14 }}>
            <div style={{ fontSize:12, fontWeight:800, color:'var(--ink)', marginBottom:10, textAlign:'center' }}>
              🦘 みんなにもおすすめしてね！
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <a
                href={`https://line.me/R/msg/text/?${encodeURIComponent(SHARE_TEXT + '\n' + (typeof window !== 'undefined' ? window.location.href : ''))}`}
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                  padding:'13px 8px',
                  background:'#06c755', color:'white',
                  fontFamily:'inherit', fontSize:13, fontWeight:900,
                  borderRadius:99, textDecoration:'none',
                  boxShadow:'0 3px 0 #058842',
                }}
              >
                <span style={{ fontSize:16 }}>💬</span> LINEで送る
              </a>
              <button
                onClick={() => {
                  const url = typeof window !== 'undefined' ? window.location.href : '';
                  if (navigator.share) {
                    navigator.share({ title:'更年期不調セルフ鑑別チェック', text: SHARE_TEXT, url }).catch(()=>{});
                  } else if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => alert('リンクをコピーしたよ！📋'));
                  }
                }}
                style={{
                  flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                  padding:'13px 8px', border:'none',
                  background:'var(--purple)', color:'white',
                  fontFamily:'inherit', fontSize:13, fontWeight:900,
                  borderRadius:99, cursor:'pointer',
                  boxShadow:'0 3px 0 #6d28d9',
                }}
              >
                <span style={{ fontSize:16 }}>🔗</span> リンクをコピー
              </button>
            </div>
          </div>

          <button className="reset-btn" onClick={onBack}>
            ← チェック表に戻る
          </button>
        </div>
      );
    }

    function InfoBox({ label, value, color }) {
      return (
        <div style={{
          background:'white', borderRadius:14, padding:'12px 14px',
          border:`2px solid ${color.light}`,
        }}>
          <div style={{ fontSize:11, fontWeight:800, color: color.deep, marginBottom:5 }}>{label}</div>
          <div style={{ fontSize:13, color:'var(--ink)', lineHeight:1.6, fontWeight:500 }}>{value}</div>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  APP                                                                 */
    /* ------------------------------------------------------------------ */
    function App() {
      const [scores, setScores] = useState(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) { return {}; }
      });
      const [page,   setPage]   = useState('check');

      // Persist scores
      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); }
        catch (e) {}
      }, [scores]);

      const totalItems    = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);
      const answeredItems = Object.keys(scores).length;
      const progress      = Math.round((answeredItems / totalItems) * 100);

      const handleSelect = (id, val) => setScores(prev => ({ ...prev, [id]: val }));

      const handleReset = () => {
        if (window.confirm('回答を全部リセットして最初からやり直しますか？')) {
          setScores({});
          setPage('check');
          window.scrollTo({ top:0, behavior:'smooth' });
        }
      };

      const handleShowResults = () => {
        setPage('results');
        window.scrollTo({ top:0, behavior:'smooth' });
      };

      const handleBack = () => {
        setPage('check');
        window.scrollTo({ top:0, behavior:'smooth' });
      };

      if (page === 'results') {
        return <ResultsView scores={scores} onBack={handleBack} />;
      }

      return (
        <div className="wrap">
          {/* LINE登録特典バッジ */}
          <div style={{
            display:'flex', alignItems:'center', justifyContent:'center', gap:6,
            background:'linear-gradient(90deg, #06c755, #00b900)',
            color:'white', fontWeight:900, fontSize:12,
            padding:'9px 14px', borderRadius:99,
            marginTop:18, marginBottom:10,
            boxShadow:'0 4px 0 #058842, 0 6px 20px rgba(6,199,85,0.30)',
            letterSpacing:'0.02em',
          }}>
            <span style={{ fontSize:14 }}>🎁</span>
            LINE登録ありがとう特典 ✨ 限定プレゼント
          </div>

          {/* Hero with kangaroo */}
          <div style={{
            background:'linear-gradient(135deg, #ffe0ec 0%, #fff4c1 55%, #ccf7eb 100%)',
            borderRadius:28,
            padding:'22px 20px',
            marginBottom:16,
            border:'3px solid white',
            boxShadow:'0 6px 0 rgba(255,111,165,0.20), 0 12px 32px rgba(167,139,250,0.18)',
            display:'flex', alignItems:'center', gap:14,
            position:'relative', overflow:'hidden',
          }}>
            <span className="twinkle" style={{ position:'absolute', top:14, right:24, fontSize:18 }}>✨</span>
            <span className="twinkle d2" style={{ position:'absolute', bottom:18, right:50, fontSize:14 }}>💖</span>
            <span className="twinkle d3" style={{ position:'absolute', top:34, right:90, fontSize:11 }}>⭐</span>
            <img
              src="assets/kangaroo.png"
              alt="カンガルーみさみさ先生"
              className="wobble"
              style={{ width:108, height:108, flexShrink:0, objectFit:'contain', filter:'drop-shadow(0 4px 8px rgba(0,0,0,0.10))' }}
            />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{
                display:'inline-block',
                fontSize:11, fontWeight:800, color:'white',
                background:'var(--pink)', padding:'3px 11px', borderRadius:99,
                marginBottom:7,
                boxShadow:'0 2px 0 #be3978',
              }}>
                🦘 カンガルーみさみさ先生
              </div>
              <h1 style={{ fontSize:19, fontWeight:900, color:'var(--ink)', lineHeight:1.3, marginBottom:6 }}>
                更年期不調<br />セルフ鑑別チェック
              </h1>
              <p style={{ fontSize:11.5, color:'var(--gray)', lineHeight:1.55, fontWeight:600 }}>
                過去1ヶ月のあなたの状態で<br />当てはまるものを選んでね💕
              </p>
            </div>
          </div>

          {/* Sticky progress with kangaroo cheer */}
          <div style={{
            position:'sticky', top:8, zIndex:10,
            background:'white', borderRadius:18, padding:'12px 16px',
            margin:'10px 0 14px',
            boxShadow:'0 4px 0 #f0e9fa, 0 8px 22px rgba(167,139,250,0.10)',
            border:'2.5px solid #f0e9fa',
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <span style={{ fontSize:12, fontWeight:800, color:'var(--ink)', display:'flex', alignItems:'center', gap:5 }}>
                <span style={{ fontSize:14 }}>🦘</span> 回答進捗
              </span>
              <span style={{
                fontSize:12, fontWeight:900, color:'var(--pink-deep)',
                background:'var(--pink-soft)', padding:'3px 10px', borderRadius:99,
              }}>
                {answeredItems} / {totalItems} 問
              </span>
            </div>
            <div className="prog-track">
              <div className="prog-fill" style={{ width:`${progress}%` }} />
            </div>
          </div>

          {/* Scoring guide */}
          <div style={{
            background:'#fff4c1',
            border:'2.5px solid #ffd93d',
            borderRadius:18,
            padding:'12px 16px',
            marginBottom:16,
            fontSize:12,
            color:'#7a5c00',
            lineHeight:1.65,
            fontWeight:600,
            boxShadow:'0 3px 0 #ffd93d80',
          }}>
            <strong style={{ color:'#a16207' }}>💡 配点ルール：</strong><br />
            <span style={{ fontWeight:800 }}>0</span> ぜんぜん　／　<span style={{ fontWeight:800 }}>1</span> たまに　／　<span style={{ fontWeight:800 }}>2</span> よくある　／　<span style={{ fontWeight:800 }}>3</span> 毎日
          </div>

          {/* Sections */}
          {SECTIONS.map(sec => (
            <SectionCard
              key={sec.id}
              section={sec}
              scores={scores}
              onSelect={handleSelect}
              totalSections={SECTIONS.length}
            />
          ))}

          {/* Encouragement message with kangaroo */}
          <div style={{
            background:'linear-gradient(135deg, #fff4c1 0%, #ffe4d4 100%)',
            border:'2.5px solid #ffd93d',
            borderRadius:22,
            padding:'14px 16px',
            marginBottom:16,
            display:'flex', alignItems:'center', gap:12,
            boxShadow:'0 4px 0 #ffd93d80',
          }}>
            <img
              src="assets/kangaroo.png"
              alt=""
              className="wobble"
              style={{ width:64, height:64, flexShrink:0, objectFit:'contain' }}
            />
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, color:'#7a5c00', lineHeight:1.55, fontWeight:700 }}>
                全部答えるとタイプが分かるよ〜！
              </div>
              <div style={{ fontSize:11, color:'#a16207', fontWeight:600, marginTop:3 }}>
                正直な気持ちで答えてね 🦘💕
              </div>
            </div>
          </div>

          {/* 最初からやり直す（subtle） */}
          {answeredItems > 0 && (
            <div style={{ textAlign:'center', marginBottom:18 }}>
              <button
                onClick={handleReset}
                style={{
                  background:'transparent', border:'none',
                  color:'var(--gray)', fontSize:12, fontWeight:700,
                  fontFamily:'inherit', textDecoration:'underline',
                  cursor:'pointer', padding:'8px 12px',
                }}
              >
                🔄 回答をリセットして最初からやり直す
              </button>
            </div>
          )}

          {/* Footer */}
          <div style={{
            textAlign:'center', fontSize:10.5, color:'var(--gray)',
            lineHeight:1.7, fontWeight:600, padding:'14px 8px 8px',
          }}>
            🦘 監修：カンガルーみさみさ先生<br />
            このチェックは医療診断ではありません。<br />
            気になる症状は医療機関にご相談ください。
          </div>

          {/* Bottom CTA */}
          <div className="bottom-area">
            <div className="bottom-inner">
              <button className="main-btn" onClick={handleShowResults}>
                {answeredItems === totalItems
                  ? '🎯 結果を見る！'
                  : `🎯 結果を見る（残り ${totalItems - answeredItems} 問）`}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ------------------------------------------------------------------ */
    /*  MOUNT                                                               */
    /* ------------------------------------------------------------------ */
    document.getElementById('loading').style.display = 'none';
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
